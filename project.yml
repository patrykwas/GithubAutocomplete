name: GitHubAutocomplete
options:
  bundleIdPrefix: com.github-autocomplete
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  AsyncAlgorithms:
    url: https://github.com/apple/swift-async-algorithms
    from: "1.0.0"

targets:
  GitHubAutocomplete:
    type: framework
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: AsyncAlgorithms
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.github-autocomplete.framework
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"

  GitHubAutocompleteApp:
    type: application
    platform: iOS
    sources:
      - path: App
    dependencies:
      - target: GitHubAutocomplete
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.github-autocomplete.app
        SWIFT_VERSION: "5.9"

  GitHubAutocompleteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: GitHubAutocomplete
      - package: AsyncAlgorithms
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.github-autocomplete.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
